server:
  port: 8101
spring:
  # 数据库配置
  # todo 需替换配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/mianshiya}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:10011001}
  # Redis 配置
  # todo 需替换配置
  redis:
    database: ${REDIS_DATABASE:1}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: ${REDIS_TIMEOUT:5000}
    password: ${REDIS_PASSWORD:}
mybatis-plus:
  configuration:
    # 生产环境关闭日志
    log-impl: ''
# 接口文档配置
knife4j:
  basic:
    enable: true
    username: ${KNIFE4J_USERNAME:root}
    password: ${KNIFE4J_PASSWORD:123456}
